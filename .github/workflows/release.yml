# Compila instaladores de Niblet para Windows y macOS.
#
# Requisito: secret ONEDRIVE_CLIENT_ID en Settings › Secrets › Actions.
#
# Disparadores:
#   - Push a `main` → compila y sube artefactos (sin GitHub Release)
#   - Manual: Actions › Build release › Run workflow
#   - Release: push de un tag v* (p. ej. v0.1.0) → artefactos + GitHub Release (draft)
name: Build release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    name: Validate secrets
    runs-on: ubuntu-latest
    steps:
      - name: Verify ONEDRIVE_CLIENT_ID
        env:
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${ONEDRIVE_CLIENT_ID}" ]; then
            echo "::error title=Missing secret::Añade ONEDRIVE_CLIENT_ID en Settings → Secrets and variables → Actions."
            exit 1
          fi

          if [ "${ONEDRIVE_CLIENT_ID}" = "your-azure-app-client-id" ]; then
            echo "::error title=Placeholder secret::Sustituye el valor de ejemplo por tu Client ID real de Azure."
            exit 1
          fi

          # Application (client) ID de Azure = UUID
          if ! echo "${ONEDRIVE_CLIENT_ID}" | grep -qE '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'; then
            echo "::error title=Invalid format::ONEDRIVE_CLIENT_ID debe ser un UUID (Application ID de Azure)."
            exit 1
          fi

          echo "ONEDRIVE_CLIENT_ID configurado (formato válido)."

  build:
    name: Build (${{ matrix.artifact }})
    needs: validate
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            artifact: windows
            bundle_glob: src-tauri/target/release/bundle/**/*
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact: macos-arm64
            bundle_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/**/*
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact: macos-x64
            bundle_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/**/*

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          CI: true
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: niblet-${{ matrix.artifact }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Niblet ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*
